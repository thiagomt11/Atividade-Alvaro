<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
    
<body>
    <div class="overlay"></div>
    <main>    
        <h1 id="titulo-login">Login</h1>
        
        <form action="" method="POST">
            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" required placeholder="Email">
            </div>

            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" required placeholder="Senha">
            </div>
        </form>
          
        <div id="footer-login">
            <button type="submit" id="login-btn">LOGIN</button>
            <a href="https://www.youtube.com/watch?v=rS3lPDJNdiw&pp=ygUUY29tbyByZWRlZmluaXIgc2VuaGHSBwkJxQoBhyohjO8%3D" target="_blank">Redefinir senha</a>
        </div>

        <div id="message-container">
            <div id="message-header">
                <p>Atenção!</p>
                <button id="fechar-btn">&times;</button>
            </div>
            <hr>
            <p id="message"></p>
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
